name: Release at Github
on:
  workflow_call:
    inputs:
      FILE:
        type: string
        required: true
        
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Start
        run: echo Releasing ${{ inputs.FILE }}
      - name: Load File
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
            name: ${{ inputs.FILE }}
      - name: Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: ${{ inputs.FILE }}
            asset_name: ${{ inputs.FILE }}
            tag: ${{ github.ref }}-snapshot
            overwrite: true
