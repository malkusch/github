name: Build
on:
  workflow_call:
    inputs:
      JDK_VERSION:
        type: string
        required: false
      JDK_DISTRIBUTION:
        type: string
        default: temurin
      BUILD_TARGETS:
        type: string
        default: package
      ALLOW_PRIVILEGED_PORT:
        type: number
        required: false
      WORKING_DIRECTORY:
        type: string
        default: .
        required: false
      INTEGRATION_TESTS_ENABLED:
        type: boolean
        default: true
      UNIT_TESTS_ENABLED:
        type: boolean
        default: true
    outputs:
      JDK_VERSION:
        value: ${{ jobs.jdk_version.outputs.JDK_VERSION }}
      jar:
        value: ${{ jobs.build.outputs.jar }}

env:
  TARGET_PATH: ${{ inputs.WORKING_DIRECTORY }}/target

jobs:
  jdk_version:
    env:
      JDK_VERSION: ${{ inputs.JDK_VERSION }}
    outputs:
      JDK_VERSION: ${{ steps.result.outputs.JDK_VERSION }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
      - if: ${{ ! env.JDK_VERSION }}
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - if: ${{ ! env.JDK_VERSION }}
        id: Detect
        uses: YunaBraska/java-info-action@575e99f42f2915cc62410c7917fef5558257042c
        with:
          jv-fallback: 1
          work-dir: ${{ inputs.WORKING_DIRECTORY }}
        
      - if: ${{ ! env.JDK_VERSION }}
        name: Detected
        run: echo "JDK_VERSION=${{ steps.detect.outputs.java_version }}" >> $GITHUB_ENV
        
      - if: ${{ ! env.JDK_VERSION || env.JDK_VERSION <= 5 }}
        name: Not Detected
        run: |
          echo "::error file={name},line={line},endLine={endLine},title={title}::Could not detect JDK (was $JDK_VERSION)"
          exit 1
    
      - id: result
        name: Result ${{ env.JDK_VERSION }}
        run: echo "JDK_VERSION=$JDK_VERSION" >> $GITHUB_OUTPUT
        
  build:
    runs-on: ubuntu-latest
    needs: [jdk_version]
    env:
      JDK_VERSION: ${{ needs.jdk_version.outputs.JDK_VERSION }}
    outputs:
      jar: ${{ steps.setJar.outputs.jar }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    steps:
    - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
    - name: Set up JDK 
      uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5
      with:
        java-version: ${{ env.JDK_VERSION }}
        distribution: ${{ inputs.JDK_DISTRIBUTION }}
        cache: maven
    - name: Build jar
      run: mvn --batch-mode --update-snapshots clean ${{ inputs.BUILD_TARGETS }} -Dmaven.test.skip
    - name: Set JAR_NAME
      run: |
        JAR_NAME=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout).jar
        echo "JAR_NAME=$JAR_NAME"
        echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV
    - name: Save jar
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ env.JAR_NAME }}
        path: ${{ env.TARGET_PATH }}/${{ env.JAR_NAME }}
        retention-days: 1
    - id: setJar
      run: echo "jar=$JAR_NAME" >> $GITHUB_OUTPUT
    - name: Build Tests
      run: mvn --batch-mode test-compile
    - name: Save target
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: target
        path: ${{ env.TARGET_PATH }}
        retention-days: 1

  unit-tests:
    if: ${{ inputs.UNIT_TESTS_ENABLED }}
    runs-on: ubuntu-latest
    needs: [build, jdk_version]
    env:
      JDK_VERSION: ${{ needs.jdk_version.outputs.JDK_VERSION }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - name: Set up JDK
        uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ inputs.JDK_DISTRIBUTION }}
          cache: maven
      - name: Restore target
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
            name: target
            path: ${{ env.TARGET_PATH }}
      - name: Allow privileged port
        if: ${{ inputs.ALLOW_PRIVILEGED_PORT }}
        run: sudo sysctl net.ipv4.ip_unprivileged_port_start=${{ inputs.ALLOW_PRIVILEGED_PORT }}
      - name: Test
        run: mvn --batch-mode test
      - name: Publish Test Report
        if: always()
        uses: scacap/action-surefire-report@fa13579fdd93ed8fc7e717a25eceedcfcbc39dda
        with:
          check_name: Unit Tests
          fail_if_no_tests: true
          fail_on_test_failures: true
          file_name_in_stack_trace: true

  integration-tests:
    if: ${{ inputs.INTEGRATION_TESTS_ENABLED }}
    runs-on: ubuntu-latest
    needs: [build, jdk_version]
    env:
      JDK_VERSION: ${{ needs.jdk_version.outputs.JDK_VERSION }}
    defaults:
      run:
        working-directory: ${{ inputs.WORKING_DIRECTORY }}
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - name: Set up JDK
        uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ inputs.JDK_DISTRIBUTION }}
          cache: maven
      - name: Restore target
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
            name: target
            path: ${{ env.TARGET_PATH }}
      - name: Set Environment variables
        uses: oNaiPs/secrets-to-env-action@01f91495da110d5e3e64b1b01f1b38cb28fb0f42
        with:
            secrets: ${{ toJSON(secrets) }}
      - name: Allow privileged port
        if: ${{ inputs.ALLOW_PRIVILEGED_PORT }}
        run: sudo sysctl net.ipv4.ip_unprivileged_port_start=${{ inputs.ALLOW_PRIVILEGED_PORT }}
      - name: Test
        run: mvn --batch-mode failsafe:integration-test failsafe:verify -Dskip.surefire.tests
      - name: Publish Test Report
        if: always()
        uses: scacap/action-surefire-report@fa13579fdd93ed8fc7e717a25eceedcfcbc39dda
        with:
          check_name: Integration Tests
          fail_if_no_tests: true
          fail_on_test_failures: true
          file_name_in_stack_trace: true
